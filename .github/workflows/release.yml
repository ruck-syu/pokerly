name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tagger.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: tagger
        run: |
          latest_tag=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            new_tag="v0.0.1"
          else
            if [[ $latest_tag =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}"
            else
              new_tag="v0.0.1"
            fi
          fi
          echo "Latest tag: $latest_tag"
          echo "New tag: $new_tag"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

  build-android:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64
          mv build/app/outputs/flutter-apk/app-release.apk Pokerly-arm64.apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Pokerly-arm64.apk

  build-windows:
    needs: versioning
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows
        run: |
          flutter pub get
          flutter build windows --release
      - name: Compress to ZIP
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Pokerly-Windows.zip
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: Pokerly-Windows.zip

  build-macos:
    needs: versioning
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build macOS
        run: |
          flutter pub get
          flutter build macos --release
      - name: Create DMG
        run: |
          mkdir -p dmg_folder
          cp -r build/macos/Build/Products/Release/Pokerly.app dmg_folder/
          hdiutil create -volname "Pokerly" -srcfolder dmg_folder -ov -format UDZO Pokerly-macOS.dmg
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Pokerly-macOS.dmg

  build-linux:
    needs: versioning
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libfuse2
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux
        run: |
          flutter pub get
          flutter build linux --release
      - name: Create AppImage
        run: |
          wget -qO appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          cp assets/logo.svg AppDir/pokerly.svg
          
          cat << 'EOF' > AppDir/pokerly.desktop
          [Desktop Entry]
          Name=Pokerly
          Exec=pokerly
          Icon=pokerly
          Type=Application
          Categories=Game;
          EOF
          
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "\${0}")")"
          export LD_LIBRARY_PATH="\${HERE}/usr/lib:\${LD_LIBRARY_PATH}"
          exec "\${HERE}/usr/bin/pokerly" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          ./appimagetool AppDir Pokerly-Linux-x86_64.AppImage
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: Pokerly-Linux-x86_64.AppImage

  publish:
    needs: [versioning, build-android, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare Assets
        run: |
          mkdir -p final-assets
          mv release-artifacts/android-apk/Pokerly-arm64.apk final-assets/
          mv release-artifacts/windows-zip/Pokerly-Windows.zip final-assets/
          mv release-artifacts/macos-dmg/Pokerly-macOS.dmg final-assets/
          mv release-artifacts/linux-appimage/Pokerly-Linux-x86_64.AppImage final-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.versioning.outputs.new_tag }}
          name: Release ${{ needs.versioning.outputs.new_tag }}
          generate_release_notes: true
          files: final-assets/*