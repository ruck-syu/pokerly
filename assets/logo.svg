<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0C6A48" />
      <stop offset="100%" stop-color="#081B14" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8962F" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#gold-grad)" stroke-width="12" />
  
  <!-- Outer Poker Chip Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold-grad)" stroke-width="24" stroke-dasharray="45 25" />
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="150" fill="#11251D" stroke="url(#gold-grad)" stroke-width="8" />

  <!-- Spade Symbol -->
  <path d="M 256 130 C 256 130 150 250 150 310 C 150 350 180 375 216 375 C 238 375 256 355 256 355 C 256 355 274 375 296 375 C 332 375 362 350 362 310 C 362 250 256 130 256 130 Z M 256 355 C 256 355 246 410 210 420 L 302 420 C 266 410 256 355 256 355 Z" fill="url(#gold-grad)" />
</svg>